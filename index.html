<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khách Hàng Điện</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#007aff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>

body{
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:#f2f2f7;
    margin:0;
    padding:16px;
}

h1{
    font-size:24px;
}

.card{
    background:white;
    padding:14px;
    border-radius:18px;
    margin-bottom:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input,textarea{
    width:100%;
    padding:12px;
    box-sizing:border-box;
    border-radius:12px;
    border:1px solid #ddd;
    margin-top:8px;
    font-size:16px;
}

textarea{
    min-height:80px;
    font-family:inherit;
    white-space:pre-wrap;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 14px;
    font-size:15px;
    margin-top:8px;
    cursor:pointer;
}

.primary{
    background:#007aff;
    color:white;
}

.success{
    background:#34c759;
    color:white;
}

.danger{
    background:#ff3b30;
    color:white;
}

.row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.phone-card{
    background:white;
    padding:14px;
    border-radius:18px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.phone-number{
    font-size:22px;
    font-weight:bold;
}

.status{
    margin-top:8px;
    margin-right:6px;
    padding:6px 10px;
    border-radius:999px;
    display:inline-block;
    font-size:13px;
    cursor:pointer;
}

.called{
    background:#d1f7dd;
    color:#147a36;
}

.not-called{
    background:#ffe4e1;
    color:#c0392b;
}

.sms-sent{
    background:#d1e8ff;
    color:#0a4a8f;
}

.sms-not-sent{
    background:#fff4d1;
    color:#8a6d00;
}

.info-box{
    margin-top:8px;
    background:#fafafa;
    border:1px solid #ddd;
    padding:10px;
    border-radius:12px;
}

.amount{
    font-weight:bold;
    color:#c0392b;
    font-size:18px;
}

.history-box{
    margin-top:8px;
    background:#f0f7ff;
    border:1px solid #cfe2ff;
    padding:8px 10px;
    border-radius:10px;
    font-size:13px;
    color:#0a4a8f;
    white-space:pre-wrap;
}

</style>
</head>

<body>

<h1>⚡ Khách Hàng Điện</h1>

<div class="card">

<input type="file"
id="excelFile"
accept=".xlsx,.xls"
onchange="importExcel(event)">

<input type="text"
id="searchInput"
placeholder="🔍 Tìm số điện thoại..."
oninput="renderList()">

<div class="row">
<button class="danger" onclick="clearAll()">
🗑 Xóa tất cả
</button>
</div>

<div id="counter"></div>

</div>

<div id="phoneList"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getDatabase,
  ref,
  set,
  push,
  onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDfKwirzou-RpDjoQF4bhuhBZ9iVL_EAc",
  authDomain: "task-f3871.firebaseapp.com",
  databaseURL: "https://task-f3871.firebaseio.com",
  projectId: "task-f3871",
  storageBucket: "task-f3871.firebasestorage.app",
  messagingSenderId: "624608239682",
  appId: "1:624608239682:web:fd5b4b2664c0ec918f8ddb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.set = set;
window.push = push;
window.onValue = onValue;

console.log("Firebase Connected");

</script>

<script>

let phoneData =
JSON.parse(localStorage.getItem('phoneData') || '[]');

function saveData(){

    localStorage.setItem(
        'phoneData',
        JSON.stringify(phoneData)
    );

    if(window.db){

        set(
            ref(db,'customers'),
            phoneData
        );

    }

}

// Ghi nhật ký riêng cho từng hành động trên Firebase
function logAction(phone,name,action,detail){

    if(!window.db) return;

    push(
        ref(db,'logs'),
        {
            phone:phone||'',
            name:name||'',
            action:action,
            detail:detail||'',
            time:new Date().toLocaleString('vi-VN')
        }
    );

}

function normalizePhone(phone){
    return phone.replace(/[^0-9]/g,'');
}

function formatAmount(value){

    if(value===null||value===undefined||value==='')
        return '0';

    const num =
    Number(
        String(value).replace(/[^0-9.-]/g,'')
    );

    if(isNaN(num)) return String(value);

    return num.toLocaleString('vi-VN');

}

// Thêm 1 dòng vào lịch sử của khách hàng
function appendHistory(index,text){

    const time =
    new Date().toLocaleString('vi-VN');

    const line = `[${time}] ${text}`;

    if(!phoneData[index].history){
        phoneData[index].history = '';
    }

    phoneData[index].history =
    phoneData[index].history
        ? phoneData[index].history + '\n' + line
        : line;

}

function importExcel(event){

    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        const data =
        new Uint8Array(e.target.result);

        const workbook =
        XLSX.read(data,{type:'array'});

        const sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ];

        const json =
        XLSX.utils.sheet_to_json(sheet);

        let added = 0;

        json.forEach(row=>{

            const customerCode =
            row.MA_KHTT ||
            row.MA_KH ||
            row.MAKH ||
            '';

            const customerName =
            row.TEN_KHTT ||
            row.TEN_KH ||
            '';

            const address =
            row.DCHI_KHTT ||
            row.DCHI_KH ||
            '';

            const amount =
            row.SO_TIEN ||
            row.SOTIEN ||
            row.CONGNO ||
            '0';

            const phoneRaw =
            row.SO_DIENTHOAI ||
            row.SDT ||
            row.DIENTHOAI ||
            '';

            if(!phoneRaw) return;

            const normalized =
            normalizePhone(
                String(phoneRaw)
            );

            if(
                !phoneData.find(
                    p=>p.phone===normalized
                )
            ){

                phoneData.push({

                    phone:normalized,
                    customerCode,
                    customerName,
                    address,
                    amount,
                    note:'',
                    history:'',
                    called:false,
                    time:null,
                    smsSent:false,
                    smsTime:null

                });

                added++;

            }

        });

        saveData();
        logAction('','','IMPORT',`Thêm ${added} khách hàng từ Excel`);
        renderList();

        alert('Đã import '+added+' khách hàng');

    };

    reader.readAsArrayBuffer(file);

}

function callNumber(phone,index){

    const item = phoneData[index];

    item.called = true;
    item.time = new Date().toLocaleString('vi-VN');

    appendHistory(index,'📲 Đã bấm GỌI');

    saveData();
    logAction(phone,item.customerName,'CALL','Bấm gọi điện');
    renderList();

    window.location.href = 'tel:'+phone;

}

function sendSMS(phone,name,code,amount,index){

    const item = phoneData[index];

    const msgText =
        'Kính gửi '+(name||'')+
        ' - MãKH '+(code||'')+
        ', vui lòng thanh toán '+formatAmount(amount);

    const msg = encodeURIComponent(msgText);

    item.smsSent = true;
    item.smsTime = new Date().toLocaleString('vi-VN');

    appendHistory(index,'💬 Đã bấm SMS - '+formatAmount(amount)+'đ');

    saveData();
    logAction(phone,name,'SMS',msgText);
    renderList();

    window.location.href = `sms:${phone}&body=${msg}`;

}

function updateNote(index,value){

    phoneData[index].note = value;

    saveData();

}

function toggleCalled(index){

    const item = phoneData[index];

    item.called = !item.called;
    item.time = new Date().toLocaleString('vi-VN');

    appendHistory(index,
        item.called
        ? '✓ Đánh dấu ĐÃ GỌI (thủ công)'
        : '✗ Bỏ đánh dấu đã gọi'
    );

    saveData();
    logAction(
        item.phone,
        item.customerName,
        'TOGGLE_CALL',
        item.called?'Đánh dấu đã gọi':'Bỏ đánh dấu'
    );
    renderList();

}

function toggleSms(index){

    const item = phoneData[index];

    item.smsSent = !item.smsSent;
    item.smsTime = new Date().toLocaleString('vi-VN');

    appendHistory(index,
        item.smsSent
        ? '✓ Đánh dấu ĐÃ NHẮN (thủ công)'
        : '✗ Bỏ đánh dấu đã nhắn'
    );

    saveData();
    logAction(
        item.phone,
        item.customerName,
        'TOGGLE_SMS',
        item.smsSent?'Đánh dấu đã nhắn':'Bỏ đánh dấu'
    );
    renderList();

}

function deletePhone(index){

    const item = phoneData[index];

    logAction(item.phone,item.customerName,'DELETE','Xóa khách hàng');

    phoneData.splice(index,1);

    saveData();
    renderList();

}

function clearAll(){

    if(confirm('Xóa toàn bộ dữ liệu?')){

        logAction('','','CLEAR_ALL','Xóa toàn bộ');

        phoneData = [];

        saveData();

        renderList();

    }

}

function escapeAttr(str){
    return String(str||'')
        .replace(/\\/g,'\\\\')
        .replace(/'/g,"\\'")
        .replace(/"/g,'&quot;');
}

function escapeHtml(str){
    return String(str||'')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

function renderList(){

    const list =
    document.getElementById('phoneList');

    const search =
    document.getElementById('searchInput')
    .value
    .trim();

    list.innerHTML = '';

    const filtered =
    phoneData.filter(item=>
        item.phone.includes(search)
    );

    filtered.forEach(item=>{

        const realIndex =
        phoneData.indexOf(item);

        const div =
        document.createElement('div');

        div.className='phone-card';

        div.innerHTML = `

        <div class="phone-number">
        ${item.phone}
        </div>

        <div class="info-box">
        🆔 <b>${escapeHtml(item.customerCode)}</b>
        </div>

        <div class="info-box">
        👤 <b>${escapeHtml(item.customerName)}</b>
        </div>

        <div class="info-box">
        📍 ${escapeHtml(item.address)}
        </div>

        <div class="info-box">
        💰 <span class="amount">${formatAmount(item.amount)}</span> đ
        </div>

        <div>

        <span class="
        status
        ${item.called ? 'called':'not-called'}
        " onclick="toggleCalled(${realIndex})">

        ${item.called ? '✓ Đã gọi':'✗ Chưa gọi'}

        </span>

        <span class="
        status
        ${item.smsSent ? 'sms-sent':'sms-not-sent'}
        " onclick="toggleSms(${realIndex})">

        ${item.smsSent ? '✓ Đã nhắn':'✗ Chưa nhắn'}

        </span>

        </div>

        ${
            item.history
            ?
            `<div class="history-box">📜 Nhật ký:\n${escapeHtml(item.history)}</div>`
            :
            ''
        }

        <textarea
        placeholder="📝 Ghi chú riêng"
        onchange="
        updateNote(
            ${realIndex},
            this.value
        )"
        >${escapeHtml(item.note)}</textarea>

        <div class="row">

        <button
        class="primary"
        onclick="
        callNumber(
            '${item.phone}',
            ${realIndex}
        )">

        📲 Gọi

        </button>

        <button
        class="success"
        onclick="
        sendSMS(
            '${item.phone}',
            '${escapeAttr(item.customerName)}',
            '${escapeAttr(item.customerCode)}',
            '${escapeAttr(item.amount)}',
            ${realIndex}
        )">

        💬 SMS

        </button>

        <button
        class="danger"
        onclick="
        deletePhone(
            ${realIndex}
        )">

        🗑 Xóa

        </button>

        </div>

        `;

        list.appendChild(div);

    });

    const called =
    phoneData.filter(
        p=>p.called
    ).length;

    const smsSent =
    phoneData.filter(
        p=>p.smsSent
    ).length;

    document.getElementById('counter')
    .innerHTML =

    `
    <div style="margin-top:10px;font-size:14px">
    Tổng: <b>${phoneData.length}</b>
    | Đã gọi: <b>${called}</b>
    | Đã nhắn: <b>${smsSent}</b>
    </div>
    `;

}

if(window.db){

    onValue(
        ref(db,'customers'),
        (snapshot)=>{

            const data =
            snapshot.val();

            if(data){

                phoneData = data;

                localStorage.setItem(
                    'phoneData',
                    JSON.stringify(phoneData)
                );

                renderList();

            }

        }
    );

}

if('serviceWorker' in navigator){

    navigator.serviceWorker.register(
        'sw.js'
    );

}

renderList();

</script>

</body>
</html>
