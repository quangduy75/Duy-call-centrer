<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Call Tracker Realtime</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#007aff">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>

<style>

body{
    font-family:-apple-system,sans-serif;
    background:#f2f2f7;
    margin:0;
    padding:16px;
}

h1{
    font-size:24px;
}

.card{
    background:white;
    padding:14px;
    border-radius:18px;
    margin-bottom:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input,textarea{
    width:100%;
    box-sizing:border-box;
    padding:12px;
    border-radius:12px;
    border:1px solid #ddd;
    margin-top:8px;
    font-size:16px;
}

button{
    border:none;
    border-radius:12px;
    padding:12px 14px;
    margin-top:8px;
    font-size:15px;
    cursor:pointer;
}

.primary{
    background:#007aff;
    color:white;
}

.success{
    background:#34c759;
    color:white;
}

.warning{
    background:#ff9500;
    color:white;
}

.info{
    margin-top:8px;
    background:#fafafa;
    border:1px solid #ddd;
    border-radius:12px;
    padding:10px;
}

.called{
    background:#d1f7dd;
    color:#147a36;
}

.not-called{
    background:#ffe4e1;
    color:#c0392b;
}

.customer-card{
    background:white;
    padding:14px;
    border-radius:18px;
    margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.phone{
    font-size:22px;
    font-weight:bold;
}

.row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.log-box{
    margin-top:10px;
    background:#f9f9f9;
    border-radius:12px;
    padding:10px;
    font-size:13px;
    max-height:150px;
    overflow:auto;
}

</style>

</head>

<body>

<h1>📞 Call Tracker Realtime</h1>

<div class="card">

<input
type="file"
accept=".xlsx,.xls"
onchange="importExcel(event)"
>

<input
type="text"
id="searchInput"
placeholder="🔍 Tìm khách hàng..."
oninput="renderCustomers()"
>

<div id="counter"></div>

</div>

<div id="customerList"></div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    update,
    push,
    onValue
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey: "AIzaSyDDfKwirzou-RpDjoQF4bhuhBZ9iVL_EAc",

  authDomain: "task-f3871.firebaseapp.com",

  databaseURL:
  "https://task-f3871-default-rtdb.asia-southeast1.firebasedatabase.app",

  projectId: "task-f3871",

  storageBucket:
  "task-f3871.firebasestorage.app",

  messagingSenderId:
  "624608239682",

  appId:
  "1:624608239682:web:fd5b4b2664c0ec918f8ddb"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

window.db = db;
window.ref = ref;
window.update = update;
window.push = push;
window.onValue = onValue;

window.firebaseReady = true;

console.log("Firebase Connected");

</script>

<script>

let customers = {};

function normalizePhone(phone){

    return String(phone)
    .replace(/[^0-9]/g,'');

}

function addLog(customerId,action){

    const time =
    new Date().toLocaleString();

    push(
        ref(
            db,
            'customers/'+customerId+'/logs'
        ),
        {
            action,
            time
        }
    );

}

async function importExcel(event){

    const file =
    event.target.files[0];

    if(!file) return;

    const reader =
    new FileReader();

    reader.onload =
    function(e){

        const data =
        new Uint8Array(
            e.target.result
        );

        const workbook =
        XLSX.read(
            data,
            {type:'array'}
        );

        const sheet =
        workbook.Sheets[
            workbook.SheetNames[0]
        ];

        const json =
        XLSX.utils
        .sheet_to_json(sheet);

        json.forEach(row=>{

            const customerId =
            String(
                row.MA_KHTT || ''
            ).trim();

            if(!customerId) return;

            const customer = {

                customerId,

                customerName:
                row.TEN_KHTT || '',

                address:
                row.DCHI_KHTT || '',

                phone:
                normalizePhone(
                    row.SO_DIENTHOAI || ''
                ),

                amount:
                row.SO_TIEN ||
                row.CONGNO ||
                0,

                note:'',
                called:false,
                lastCall:'',
                noticePasted:false,
                noticeTime:''

            };

            update(
                ref(
                    db,
                    'customers/'+customerId
                ),
                customer
            );

            addLog(
                customerId,
                '📥 Import khách hàng'
            );

        });

        alert(
            'Import thành công'
        );

    };

    reader.readAsArrayBuffer(file);

}

function callCustomer(customerId,phone){

    update(
        ref(
            db,
            'customers/'+customerId
        ),
        {
            called:true,
            lastCall:
            new Date()
            .toLocaleString()
        }
    );

    addLog(
        customerId,
        '📞 Đã gọi'
    );

    window.location.href =
    'tel:'+phone;

}

function sendSMS(
    customerId,
    phone,
    name
){

    addLog(
        customerId,
        '💬 Gửi SMS'
    );

    const msg =
    encodeURIComponent(
        'Xin chào '+name
    );

    window.location.href =
    `sms:${phone}&body=${msg}`;

}

function markNotice(customerId){

    update(
        ref(
            db,
            'customers/'+customerId
        ),
        {
            noticePasted:true,
            noticeTime:
            new Date()
            .toLocaleString()
        }
    );

    addLog(
        customerId,
        '📌 Đã dán thông báo'
    );

}

function updateNote(
    customerId,
    value
){

    update(
        ref(
            db,
            'customers/'+customerId
        ),
        {
            note:value
        }
    );

    addLog(
        customerId,
        '📝 Cập nhật ghi chú'
    );

}

function renderCustomers(){

    const list =
    document.getElementById(
        'customerList'
    );

    const search =
    document.getElementById(
        'searchInput'
    )
    .value
    .toLowerCase();

    list.innerHTML='';

    const arr =
    Object.values(customers);

    const filtered =
    arr.filter(c=>

        String(c.customerName)
        .toLowerCase()
        .includes(search)

        ||

        String(c.phone)
        .includes(search)

        ||

        String(c.customerId)
        .toLowerCase()
        .includes(search)

    );

    filtered.forEach(c=>{

        const div =
        document.createElement('div');

        div.className =
        'customer-card';

        let logsHtml='';

        if(c.logs){

            logsHtml =
            Object.values(c.logs)
            .reverse()
            .map(log=>`

            <div>

            ${log.time}
            -
            ${log.action}

            </div>

            `)
            .join('');

        }

        div.innerHTML = `

        <div class="phone">

        ${c.phone}

        </div>

        <div class="info">

        🆔 ${c.customerId}

        </div>

        <div class="info">

        👤 ${c.customerName}

        </div>

        <div class="info">

        📍 ${c.address}

        </div>

        <div class="info">

        💰 ${c.amount}

        </div>

        <div class="
        info
        ${c.called
            ?
            'called'
            :
            'not-called'
        }">

        ${c.called
            ?
            '✔ Đã gọi'
            :
            '❌ Chưa gọi'
        }

        </div>

        <div class="info">

        🕒 ${c.lastCall || ''}

        </div>

        <div class="info">

        📌 ${
            c.noticePasted
            ?
            'Đã dán thông báo'
            :
            'Chưa dán'
        }

        </div>

        <div class="info">

        🕒 ${c.noticeTime || ''}

        </div>

        <textarea
        placeholder="📝 Ghi chú"
        onchange="
        updateNote(
            '${c.customerId}',
            this.value
        )
        "
        >

        ${c.note || ''}

        </textarea>

        <div class="row">

        <button
        class="primary"
        onclick="
        callCustomer(
            '${c.customerId}',
            '${c.phone}'
        )
        ">

        📲 Gọi

        </button>

        <button
        class="success"
        onclick="
        sendSMS(
            '${c.customerId}',
            '${c.phone}',
            '${c.customerName}'
        )
        ">

        💬 SMS

        </button>

        <button
        class="warning"
        onclick="
        markNotice(
            '${c.customerId}'
        )
        ">

        📌 Dán TB

        </button>

        </div>

        <div class="log-box">

        <b>
        🕒 Nhật ký
        </b>

        <br><br>

        ${logsHtml}

        </div>

        `;

        list.appendChild(div);

    });

    document.getElementById(
        'counter'
    )
    .innerHTML =

    `
    Tổng khách:
    ${filtered.length}
    `;

}

setTimeout(()=>{

onValue(
    ref(db,'customers'),
    snapshot=>{

        customers =
        snapshot.val() || {};

        renderCustomers();

    }
);

},1000);

if(
    'serviceWorker'
    in navigator
){

    navigator
    .serviceWorker
    .register('sw.js');

}

</script>

</body>
</html>
